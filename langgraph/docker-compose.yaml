services:
  langgraph-gateway:
    build: .
    container_name: langgraph-gateway
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "127.0.0.1:8000:8000"

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

    networks:
      - ainet

networks:
  ainet:
    external: true
