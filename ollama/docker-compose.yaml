services:
  ollama:
    image: ollama/ollama:rocm
    container_name: ollama
    restart: unless-stopped

    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri

    environment:
      OLLAMA_HOST: "0.0.0.0:11434"

      # RX 6700 XT is gfx1031; force nearby gfx1030 target.
      HSA_OVERRIDE_GFX_VERSION: "10.3.0"

      # Use the first visible AMD GPU.
      ROCR_VISIBLE_DEVICES: "0"

      # 12GB VRAM safety settings.
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_QUEUE: "32"
      OLLAMA_CONTEXT_LENGTH: "4096"
      OLLAMA_KEEP_ALIVE: "5m"

    volumes:
      - ollama:/root/.ollama

    ports:
      - "0.0.0.0:11434:11434"

    networks:
      - ainet

volumes:
  ollama:

networks:
  ainet:
    external: true
